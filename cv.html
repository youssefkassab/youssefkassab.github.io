<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV — Youssef Kassab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg:        #080b0f;
      --surface:   #0d1117;
      --card:      #111820;
      --border:    #1e2d3d;
      --accent:    #00d4ff;
      --accent2:   #0ea5e9;
      --accent3:   #7c3aed;
      --muted:     #4a6274;
      --text:      #e2eaf2;
      --subtext:   #8ba3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .container {
      max-width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      opacity: 0.9;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }

    .viewer-wrapper {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .pdf-container {
      width: 100%;
      height: 100%;
      background: #000;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
    }

    .pdf-page-canvas {
      display: block;
      margin: 10px auto;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      max-width: 90vw;
    }

    /* Custom scrollbar */
    .pdf-container::-webkit-scrollbar {
      width: 8px;
    }

    .pdf-container::-webkit-scrollbar-track {
      background: var(--card);
    }

    .pdf-container::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 4px;
    }

    .pdf-container::-webkit-scrollbar-thumb:hover {
      background: var(--accent2);
    }

    .no-support {
      text-align: center;
      padding: 40px 20px;
      color: var(--subtext);
    }

    .no-support h2 {
      color: var(--text);
      margin-bottom: 12px;
      font-size: 18px;
    }

    .no-support p {
      margin-bottom: 16px;
    }

    .no-support a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .no-support a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Curriculum Vitae</h1>
      <div class="header-actions">
        <a href="Youssef_Kassab_CV (final).pdf" class="btn btn-primary" download>
          ⬇️ Download PDF
        </a>
        <a href="index.html" class="btn">
          ← Back to Portfolio
        </a>
      </div>
    </div>

    <div class="viewer-wrapper">
      <div class="pdf-container" id="pdf-container">
        <div style="text-align: center; padding: 40px 20px; color: var(--subtext);">
          <p style="font-size: 14px;">Loading PDF...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let pdfDoc = null;
    
    // Set up PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    // Load and render all PDF pages
    async function loadPDF() {
      try {
        pdfDoc = await pdfjsLib.getDocument('Youssef_Kassab_CV (final).pdf').promise;
        const container = document.getElementById('pdf-container');
        container.innerHTML = ''; // Clear loading message
        
        for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
          await renderPage(pageNum, container);
        }
      } catch (error) {
        console.error('Error loading PDF:', error);
        document.getElementById('pdf-container').innerHTML = `
          <div style="text-align: center; padding: 40px 20px; color: var(--subtext);">
            <h2 style="color: var(--text); margin-bottom: 12px; font-size: 18px;">Error loading PDF</h2>
            <p><a href="Youssef_Kassab_CV (final).pdf" target="_blank" style="color: var(--accent); text-decoration: none;">Click here to download the PDF</a></p>
          </div>
        `;
      }
    }
    
    async function renderPage(pageNum, container) {
      try {
        const page = await pdfDoc.getPage(pageNum);
        const canvas = document.createElement('canvas');
        canvas.className = 'pdf-page-canvas';
        const context = canvas.getContext('2d');
        
        const scale = window.devicePixelRatio || 1;
        const viewport = page.getViewport({ scale: scale * 1.5 });
        
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        
        await page.render({
          canvasContext: context,
          viewport: viewport
        }).promise;
        
        container.appendChild(canvas);
      } catch (error) {
        console.error('Error rendering page ' + pageNum + ':', error);
      }
    }
    
    // Load PDF when page loads
    window.addEventListener('load', loadPDF);
  </script>
</body>
</html>
